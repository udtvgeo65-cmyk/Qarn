 <!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>معرض خبير السيارات - عبد الرحمن</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #121212; color: white; margin: 0; padding: 20px; }
        h1 { text-align: center; color: #fdbb2d; margin-bottom: 30px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; max-width: 1200px; margin: auto; }
        .car-card { background: #1e1e1e; border-radius: 15px; overflow: hidden; box-shadow: 0 10px 20px rgba(0,0,0,0.3); transition: 0.3s; border: 1px solid #333; }
        .car-card:hover { transform: translateY(-5px); border-color: #fdbb2d; }
        .car-card img { width: 100%; height: 200px; object-fit: cover; }
        .info { padding: 20px; }
        .price { color: #fdbb2d; font-size: 1.2rem; font-weight: bold; }
        .opinion { background: #2d2d2d; padding: 10px; border-radius: 8px; margin-top: 10px; font-style: italic; font-size: 0.9rem; }
    </style>
</head>
<body>

    <h1>موقع عبد الرحمن لمقارنة السيارات 🏎️</h1>
    <div class="grid" id="carsContainer"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCaSuisueU2cyqJI7WK2EJXHmrdLyvwkBE",
            authDomain: "qarn-95c43.firebaseapp.com",
            projectId: "qarn-95c43",
            storageBucket: "qarn-95c43.firebasestorage.app",
            messagingSenderId: "30111291817",
            appId: "1:30111291817:web:adc1188e1cc47dc6ba8cb8"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const container = document.getElementById('carsContainer');

        const q = query(collection(db, "cars"), orderBy("date", "desc"));
        onSnapshot(q, (snapshot) => {
            container.innerHTML = "";
            snapshot.forEach((doc) => {
                const car = doc.data();
                container.innerHTML += `
                    <div class="car-card">
                        <img src="${car.img}" onerror="this.src='https://via.placeholder.com/300?text=No+Image'" alt="${car.name}">
                        <div class="info">
                            <h2>${car.name}</h2>
                            <p class="price">السعر: ${car.price} ريال</p>
                            <div class="opinion">
                                <strong>رأي عبد الرحمن:</strong><br>
                                ${car.opinion}
                            </div>
                        </div>
                    </div>
                `;
            });
        });
    </script>
</body>
</html>
