 <!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة تحكم عبد الرحمن</title>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; text-align: center; padding: 50px; }
        .box { background: #2d2d2d; padding: 20px; border-radius: 15px; display: inline-block; width: 300px; }
        input, textarea { width: 90%; padding: 10px; margin: 10px 0; border-radius: 5px; border: none; }
        button { background: #fdbb2d; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; width: 95%; }
    </style>
</head>
<body>

<div class="box">
    <h3>إضافة سيارة جديدة 🏎️</h3>
    <input type="text" id="name" placeholder="اسم السيارة">
    <input type="text" id="price" placeholder="السعر">
    <textarea id="opinion" placeholder="رأي عبد الرحمن"></textarea>
    <input type="text" id="img" placeholder="رابط الصورة">
    <button onclick="addCar()">إضافة للقاعدة</button>
    <p id="status"></p>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    // بياناتك الحقيقية من الصور
    const firebaseConfig = {
        apiKey: "AIzaSyCaSuisueU2cyqJI7WK2EJXHmrdLyvwkBE",
        authDomain: "qarn-95c43.firebaseapp.com",
        projectId: "qarn-95c43",
        storageBucket: "qarn-95c43.firebasestorage.app",
        messagingSenderId: "30111291817",
        appId: "1:30111291817:web:adc1188e1cc47dc6ba8cb8"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    window.addCar = async () => {
        const name = document.getElementById('name').value;
        const price = document.getElementById('price').value;
        const opinion = document.getElementById('opinion').value;
        const img = document.getElementById('img').value;

        try {
            await addDoc(collection(db, "cars"), {
                name, price, opinion, img, date: new Date()
            });
            document.getElementById('status').innerText = "تمت الإضافة بنجاح! ✅";
            document.querySelectorAll('input, textarea').forEach(i => i.value = "");
        } catch (e) {
            document.getElementById('status').innerText = "خطأ! تأكد من وضع التست Mode";
            console.error(e);
        }
    }
</script>
</body>
</html>
